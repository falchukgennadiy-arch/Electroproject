<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>ЭлектроПроект Donuts</title>
</head>
<body>
<div class="app-wrapper">
  <div class="header">
    <div class="logo">
      <img src="images/logo.png" alt="Donuts" class="logo-img" style="height: 30px; width: auto; margin-right: 8px;">
      ЭлектроПроект <span>Donuts</span>
    </div>
  </div>

  <div class="container">
    <!-- ГЛАВНАЯ -->
    <div id="home" class="section active">
  <div class="card">
    <h3>⚡ Добро пожаловать!!!</h3>
    <div class="placeholder-image">🔧 Доступ к эксклюзивному контенту</div>
    <p>...</p>
  </div>
</div>

    <!-- КУРСЫ -->
    <div id="courses" class="section">
      <div id="coursesList"></div>
    </div>

    <!-- ВИЗУАЛИЗАЦИЯ -->
    <div id="visual" class="section">
      <div id="visualList"></div>
    </div>

    <!-- ШАБЛОНЫ -->
    <div id="templates" class="section">
      <div id="templatesList"></div>
    </div>

    <!-- ТЕСТЫ -->
    <div id="tests" class="section">
      <div id="topicsList"></div>
      <div id="testArea"></div>
    </div>

    <!-- ПРОФИЛЬ -->
    <div id="profile" class="section">
      <div class="card profile-card">
        <div class="profile-header">
          <div class="profile-avatar" id="avatar"></div>
          <div class="profile-info">
            <h3 id="displayName">Алексей Александров</h3>
            <p id="userEmail">alex@example.com</p>
            <p class="subtle">С нами <span id="daysWithUs">0</span> дней</p>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>Мои подписки</h3>
        <div id="subscriptionsList"></div>
      </div>
    </div>

    <!-- Панель управления тестом -->
    <div id="testControls" class="test-controls">
      <div class="controls-wrap">
        <button class="button" id="favoriteBtn" onclick="window.toggleFavorite(currentQuestions[currentQuestionIndex]?.id)">
          <div class="icon icon-star"></div>
          Избранное
        </button>
        <button class="button ghost" onclick="exitTest()">Выйти</button>
        <button class="button ghost" onclick="finishTest()">Завершить</button>
        <button class="button primary" id="submitMultipleBtn" onclick="window.submitMultipleAnswer()">Подтвердить</button>
        <button class="button primary" id="nextBtn" onclick="nextQuestion()">Далее</button>
      </div>
    </div>
  </div> <!-- закрываем container -->

  <!-- Нижняя навигация ВНЕ container -->
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="navigate('home',this)">
      <div class="icon icon-home"></div>
      <span>Главная</span>
    </button>
    <button class="nav-btn" onclick="navigate('courses',this)">
      <div class="icon icon-courses"></div>
      <span>Курсы</span>
    </button>
    <button class="nav-btn" onclick="navigate('visual',this)">
      <div class="icon icon-visual"></div>
      <span>Visual</span>
    </button>
    <button class="nav-btn" onclick="navigate('templates',this)">
      <div class="icon icon-templates"></div>
      <span>Шаблоны</span>
    </button>
    <button class="nav-btn" onclick="navigate('tests',this)">
      <div class="icon icon-tests"></div>
      <span>Тесты</span>
    </button>
    <button class="nav-btn" onclick="navigate('profile',this)">
      <div class="icon icon-profile"></div>
      <span>Профиль</span>
    </button>
  </div>
</div> <!-- закрываем app-wrapper -->

<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/profile.css" />
<link rel="stylesheet" href="css/tests.css" />
<link rel="stylesheet" href="css/icons.css" />

<!-- Подключение скриптов -->
<script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
<script src="js/vk-bridge.js"></script>
<script src="js/config.js"></script>
<script src="js/config/subscriptions-config.js"></script>
<script src="js/api.js"></script>
<script src="js/utils/helpers.js"></script>
<script src="js/utils/calendar.js"></script>
<script src="js/modules/courses.js"></script>
<script src="js/modules/visual.js"></script>
<script src="js/modules/templates.js"></script>
<script src="js/modules/profile.js"></script>
<script src="js/modules/tests.js"></script>
<script src="js/app.js"></script>
</body>
</html>
